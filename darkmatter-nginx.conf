server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /home/callensxavier_gmail_com/SocrateAI-Scientific-Agora-Home;
    index index.html;

    # Gzip Compression for high-performance coordinate shard loading
    gzip on;
    gzip_types application/json text/css application/javascript;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy FastAPI backend on port 8000
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(leaderboard|badges|jobs|users) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
